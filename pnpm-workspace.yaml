packages:
  - "tooling/*"
  - "packages/*"
  - "apps/*"
  - "workers/*"

# Single source of dependency versions. Ranges are caret so `pnpm install`
# resolves the latest compatible patch/minor at install time (no stale exact pins).
catalog:
  # --- toolchain ---
  typescript: ^5.7.0
  tsup: ^8.3.0
  tsx: ^4.19.0
  turbo: ^2.3.0
  vitest: ^3.0.0
  "@vitest/coverage-v8": ^3.0.0
  vite: ^6.0.0
  "@vitejs/plugin-react": ^4.3.0
  eslint: ^9.17.0
  "@eslint/js": ^9.17.0
  typescript-eslint: ^8.18.0
  eslint-config-prettier: ^9.1.0
  prettier: ^3.4.0
  "@types/node": ^22.10.0
  rimraf: ^6.0.1
  jsdom: ^25.0.0
  "@testing-library/react": ^16.1.0
  "@testing-library/jest-dom": ^6.6.0
  # --- runtime: shared ---
  zod: ^3.24.0
  pino: ^9.5.0
  pino-pretty: ^13.0.0
  # --- runtime: backend ---
  fastify: ^5.2.0
  "@fastify/helmet": ^13.0.0
  "@fastify/cors": ^10.0.0
  "@fastify/rate-limit": ^10.2.0
  "@fastify/under-pressure": ^9.0.0
  "@fastify/swagger": ^9.4.0
  "@fastify/swagger-ui": ^5.2.0
  fastify-plugin: ^5.0.0
  fastify-type-provider-zod: ^4.0.0
  # --- runtime: auth ---
  jose: ^5.9.0
  # --- runtime: db ---
  drizzle-orm: ^0.38.0
  drizzle-kit: ^0.30.0
  pg: ^8.13.0
  "@types/pg": ^8.11.0
  # --- runtime: storage ---
  "@aws-sdk/client-s3": ^3.700.0
  "@aws-sdk/s3-request-presigner": ^3.700.0
  # --- runtime: workflow engine ---
  "@temporalio/client": ^1.11.0
  "@temporalio/worker": ^1.11.0
  "@temporalio/workflow": ^1.11.0
  "@temporalio/activity": ^1.11.0
  # --- runtime: frontend ---
  react: ^18.3.0
  react-dom: ^18.3.0
  "@types/react": ^18.3.0
  "@types/react-dom": ^18.3.0
  antd: ^5.22.0
